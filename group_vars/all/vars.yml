---
redmine_image: "redmine:6.1.3-bookworm"
redmine_image_digest: >-
  sha256:5256540f277ce8b5698f6ec17e053533ffc83b9832e06ca1121f0f25f9e3cda6
redmine_port: 3000
redmine_container_name: hexlet-6-redmine
redmine_files_volume: hexlet-6-redmine-files
redmine_env_directory: /etc/hexlet-6-redmine
redmine_env_file: /etc/hexlet-6-redmine/redmine.env

redmine_db_port: 6432
redmine_db_database: hexlet_6_redmine
redmine_db_username: hexlet_6_redmine_user
redmine_db_host: rc1a-cdmrgostp1nfl1p0.mdb.yandexcloud.net

datadog_site: datadoghq.eu
datadog_agent_version: "7.79.1"
datadog_config:
  tags:
    - env:production
    - project:hexlet-6
    - service:redmine

datadog_checks:
  http_check:
    init_config: {}
    instances:
      - name: hexlet-6-redmine
        service: redmine
        url: "http://127.0.0.1:{{ redmine_port }}/login"
        timeout: 5
        http_response_status_code: "200"
        collect_response_time: true
        allow_redirects: false
        skip_proxy: true
        tags:
          - project:hexlet-6
          - service:redmine
